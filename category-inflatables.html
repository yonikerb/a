<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0f172a">
    <title>מתנפחי ענק ומים | קעמפ-קליק</title>
    <link rel="icon" type="image/png" href="logo.png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Assistant', sans-serif;
        }

        body {
            background-color: #fcfcfd;
            color: #1e293b;
            line-height: 1.7;
            text-align: center;
        }

        a { text-decoration: none; color: inherit; }

        /* סרגל ניווט */
        header {
            background-color: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #e2e8f0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
        }

        .nav-right { display: flex; align-items: center; gap: 45px; }
        .logo-container img { height: 42px; display: block; object-fit: contain; }
        .nav-menu { display: flex; list-style: none; gap: 30px; }
        .nav-menu li a { color: #475569; font-size: 15px; font-weight: 500; position: relative; padding: 4px 0; }
        .nav-menu li a:hover { color: #0f172a; font-weight: 700; }
        
        .cart-btn { display: flex; align-items: center; gap: 10px; background: #fff; padding: 9px 20px; border-radius: 6px; font-weight: 600; font-size: 14px; border: 1px solid #cbd5e1; }

        /* באנר */
        .page-hero {
            background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%);
            color: white;
            padding: 50px 20px;
        }
        .page-hero h1 { font-size: 36px; font-weight: 800; margin-bottom: 10px; }

        /* גריד */
        .products-section { max-width: 1200px; margin: 50px auto; padding: 0 20px; }
        .products-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            text-align: right;
        }

        .product-card {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
        }
        .product-image { width: 100%; height: 200px; background-size: cover; background-position: center; background-color: #f1f5f9; }
        .product-body { padding: 20px; display: flex; flex-direction: column; flex-grow: 1; }
        
        .order-btn {
            background-color: #0f172a;
            color: #fff;
            padding: 10px 20px;
            border-radius: 6px;
            width: 100%;
            margin-top: 15px;
            display: block;
            font-weight: 600;
            transition: background 0.2s ease;
        }
        .order-btn:hover { background-color: #d97706; }

        footer { background-color: #0f172a; color: #64748b; padding: 35px 20px; font-size: 14px; margin-top: 100px; }
        
        /* ============= RESPONSIVE DESIGN ============= */
        
        @media (max-width: 1024px) {
            .nav-right { gap: 30px; }
            .nav-menu { gap: 20px; }
            .nav-menu li a { font-size: 14px; }
            .page-hero { padding: 40px 20px; }
            .page-hero h1 { font-size: 32px; }
            .products-section { margin: 40px auto; }
            .products-grid { grid-template-columns: repeat(2, 1fr); gap: 20px; }
            footer { font-size: 13px; margin-top: 80px; }
        }

        @media (max-width: 768px) {
            .nav-container { flex-direction: column; gap: 12px; padding: 12px 15px; }
            .nav-right { flex-direction: column; gap: 15px; width: 100%; }
            .logo-container img { height: 36px; }
            .nav-menu { flex-direction: column; gap: 10px; width: 100%; }
            .nav-menu li a { font-size: 13px; }
            .nav-left { width: 100%; }
            .cart-btn { width: 100%; justify-content: center; padding: 8px 12px; font-size: 12px; }
            
            .page-hero { padding: 30px 15px; }
            .page-hero h1 { font-size: 24px; margin-bottom: 8px; }
            .page-hero p { font-size: 13px; }
            
            .products-section { margin: 30px auto; padding: 0 15px; }
            .products-grid { grid-template-columns: 1fr; gap: 15px; }
            .product-image { height: 180px; }
            .product-body { padding: 15px; }
            .order-btn { padding: 9px 18px; font-size: 13px; }
            
            footer { padding: 25px 15px; font-size: 12px; margin-top: 60px; }
        }

        @media (max-width: 480px) {
            .nav-container { gap: 10px; padding: 10px 12px; }
            .nav-right { gap: 12px; }
            .logo-container img { height: 32px; }
            .nav-menu li a { font-size: 12px; }
            .cart-btn { padding: 7px 10px; font-size: 11px; }
            
            .page-hero { padding: 20px 12px; }
            .page-hero h1 { font-size: 20px; }
            .page-hero p { font-size: 12px; }
            
            .products-section { margin: 20px auto; padding: 0 12px; }
            .product-image { height: 160px; }
            .product-body { padding: 12px; }
            .product-body h3 { font-size: 16px; }
            .product-body p { font-size: 12px; }
            .order-btn { padding: 8px 16px; font-size: 12px; margin-top: 10px; }
            
            footer { padding: 20px 12px; font-size: 11px; margin-top: 40px; }
        }

        @media (max-width: 360px) {
            .nav-right { gap: 10px; }
            .logo-container img { height: 28px; }
            .nav-menu li a { font-size: 11px; }
            .page-hero h1 { font-size: 18px; }
            .page-hero p { font-size: 11px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="nav-container">
            <div class="nav-right">
                <div class="logo-container">
                    <a href="index.html"><img src="logo.png" alt="קעמפ-קליק"></a>
                </div>
                <ul class="nav-menu">
                    <li><a href="index.html">דף הבית</a></li>
                    <li><a href="categories.html">קטגוריות</a></li>
                    <li><a href="contact.html">יצירת קשר</a></li>
                </ul>
            </div>
            <div class="nav-left">
                <a href="#" class="cart-btn">🛒 הסל שלי (0)</a>
            </div>
        </div>
    </header>

    <section class="page-hero">
        <h1>מתנפחי ענק ומים</h1>
        <p>מגוון מתקנים מתנפחים חווייתיים לאירועים</p>
    </section>

    <main class="products-section">
        <div id="products-container" class="products-grid">
        </div>
    </main>

    <footer>
        <p>© 2026 קעמפ-קליק - כל הזכויות שמורות.</p>
    </footer>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzwpcMqNhGcFcv-1CdWDESTG4OAA1I3aZ2sNUoAZ8GSf4I-kOdFguL6hzWrggchidkN/exec";
        const CATEGORY_NAME = "מתנפחי ענק ומים"; 

        async function fetchAttractions() {
            const containerEl = document.getElementById('products-container');
            try {
                const response = await fetch(`${API_URL}?category=${encodeURIComponent(CATEGORY_NAME)}`);
                const data = await response.json();
                
                let htmlContent = '';
                data.forEach(item => {
                    htmlContent += `
                        <div class="product-card">
                            <div class="product-image" style="background-image: url('${item.image}');"></div>
                            <div class="product-body">
                                <h3>${item.title || 'אטרקציה'}</h3>
                                <p>מאת: ${item.artist || 'לא צוין'}</p>
                                <a href="order.html" class="order-btn">להזמנה</a>
                            </div>
                        </div>
                    `;
                });
                containerEl.innerHTML = htmlContent;
            } catch (error) {
                console.error("שגיאה בטעינה", error);
            }
        }
        fetchAttractions();
    </script>
</body>
</html>
