<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>צור קשר | קעמפ-קליק</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Assistant', sans-serif; }
        body { background-color: #fcfcfd; color: #1e293b; padding-bottom: 0; }
        a { text-decoration: none; color: inherit; }

        /* סרגל ניווט */
        header { background-color: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-bottom: 1px solid #e2e8f0; position: sticky; top: 0; z-index: 100; }
        .nav-container { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; }
        .nav-right { display: flex; align-items: center; gap: 45px; }
        .logo-container img { height: 42px; object-fit: contain; }
        .nav-menu { display: flex; list-style: none; gap: 30px; }
        .nav-menu li a { color: #475569; font-weight: 500; font-size: 15px; }
        .nav-menu li a:hover { color: #0f172a; font-weight: 700; }
        .cart-btn { background-color: #ffffff; padding: 9px 20px; border-radius: 6px; border: 1px solid #cbd5e1; font-weight: 600; font-size: 14px; }

        /* פס כותרת חדש */
        .page-header { background-color: #0f172a; color: white; padding: 40px 20px; text-align: center; }
        .page-header h1 { font-size: 32px; font-weight: 800; }

        /* תוכן הטופס */
        .container { max-width: 750px; margin: 40px auto; padding: 0 20px; }
        .card { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 30px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        .form-group { margin-bottom: 18px; text-align: right; }
        label { display: block; font-size: 14.5px; font-weight: 600; color: #475569; margin-bottom: 6px; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 15px; outline: none; font-family: 'Assistant', sans-serif; }
        input:focus, textarea:focus { border-color: #d97706; box-shadow: 0 0 0 3px rgba(217, 119, 6, 0.1); }
        textarea { resize: vertical; min-height: 120px; }
        .submit-btn { background-color: #0f172a; color: white; border: none; width: 100%; padding: 14px; font-size: 16px; font-weight: 700; border-radius: 6px; cursor: pointer; transition: background 0.2s ease; }
        .submit-btn:hover { background-color: #d97706; }
        .submit-btn:disabled { background-color: #94a3b8; cursor: not-allowed; }

        /* פוטר */
        footer { background-color: #0f172a; color: #64748b; text-align: center; padding: 35px 20px; font-size: 14px; margin-top: 80px; }

        /* ============= RESPONSIVE DESIGN ============= */
        
        /* טאבלט - עד 1024px */
        @media (max-width: 1024px) {
            .nav-right { gap: 30px; }
            .nav-menu { gap: 20px; }
            .nav-menu li a { font-size: 14px; }
            .page-header h1 { font-size: 28px; }
            .container { margin: 30px auto; }
            .card { padding: 25px; }
        }

        /* טלפון - עד 768px */
        @media (max-width: 768px) {
            .nav-container { flex-direction: column; gap: 15px; padding: 12px 15px; }
            .nav-right { gap: 20px; flex-direction: column; width: 100%; }
            .logo-container img { height: 36px; }
            .nav-menu { flex-direction: column; gap: 12px; width: 100%; text-align: right; }
            .nav-menu li a { font-size: 14px; }
            .nav-left { width: 100%; }
            .cart-btn { width: 100%; justify-content: center; }
            
            .page-header { padding: 30px 15px; }
            .page-header h1 { font-size: 24px; }
            
            .container { max-width: 100%; margin: 25px auto; padding: 0 15px; }
            .card { padding: 20px; border-radius: 10px; }
            .form-group { margin-bottom: 15px; }
            label { font-size: 14px; margin-bottom: 5px; }
            input, textarea { padding: 11px; font-size: 16px; }
            textarea { min-height: 100px; }
            .submit-btn { padding: 12px; font-size: 15px; }
            
            footer { padding: 25px 15px; font-size: 13px; margin-top: 60px; }
        }

        /* טלפון קטן - עד 480px */
        @media (max-width: 480px) {
            .nav-container { gap: 10px; padding: 10px 12px; }
            .nav-right { gap: 15px; }
            .logo-container img { height: 32px; }
            .nav-menu { gap: 10px; }
            .nav-menu li a { font-size: 13px; }
            .cart-btn { padding: 8px 15px; font-size: 12px; }
            
            .page-header { padding: 25px 12px; }
            .page-header h1 { font-size: 20px; }
            
            .container { margin: 20px auto; padding: 0 12px; }
            .card { padding: 18px; }
            .form-group { margin-bottom: 14px; }
            label { font-size: 13px; }
            input, textarea { padding: 10px; font-size: 16px; }
            textarea { min-height: 90px; }
            .submit-btn { padding: 11px; font-size: 14px; }
            
            footer { padding: 20px 12px; font-size: 12px; margin-top: 50px; }
        }

        /* דיוויס קטנים מאוד - עד 360px */
        @media (max-width: 360px) {
            .nav-right { gap: 12px; }
            .logo-container img { height: 28px; }
            .nav-menu li a { font-size: 12px; }
            .cart-btn { padding: 7px 12px; font-size: 11px; }
            .page-header h1 { font-size: 18px; }
            .container { padding: 0 10px; }
            .card { padding: 16px; }
            label { font-size: 12px; }
            input, textarea { padding: 9px; font-size: 15px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="nav-container">
            <div class="nav-right">
                <div class="logo-container">
                    <a href="index.html"><img src="logo.png" alt="logo"></a>
                </div>
                <ul class="nav-menu">
                    <li><a href="index.html">דף הבית</a></li>
                    <li><a href="categories.html">קטגוריות אטרקציות</a></li>
                    <li><a href="contact.html">יצירת קשר</a></li>
                </ul>
            </div>
            <div class="nav-left">
                <a href="#" class="cart-btn">🛒 הסל שלי (0)</a>
            </div>
        </div>
    </header>

    <div class="page-header">
        <h1>צור קשר</h1>
    </div>

    <div class="container">
        <div class="card">
            <form id="contactForm">
                <div class="form-group">
                    <label>שם מלא / שם הישיבה</label>
                    <input type="text" id="name" required placeholder="הזן שם...">
                </div>
                <div class="form-group">
                    <label>טלפון ליצירת קשר</label>
                    <input type="tel" id="phone" required placeholder="050-1234567">
                </div>
                <div class="form-group">
                    <label>כתובת מייל</label>
                    <input type="email" id="email" required placeholder="example@mail.com">
                </div>
                <div class="form-group">
                    <label>תוכן ההודעה</label>
                    <textarea id="message" required placeholder="כתוב כאן את פנייתך..."></textarea>
                </div>
                <button type="submit" class="submit-btn" id="submitBtn">שלח הודעה</button>
            </form>
        </div>
    </div>

    <footer>
        <p>© 2026 קעמפ-קליק - פתרונות טכנולוגיים מתקדמים לאירועים. כל הזכויות שמורות.</p>
    </footer>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbw9j7exSTcJ8vAxM7JSYqt6W1FUiHM_QaSEwzul-S5uiAMYA-o_7a_nV89zEI05fb5GTQ/exec";
        document.getElementById('contactForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerText = "שולח...";
            btn.disabled = true;
            const data = {
                action: "contact",
                name: document.getElementById('name').value,
                phone: document.getElementById('phone').value,
                email: document.getElementById('email').value,
                message: document.getElementById('message').value
            };
            try {
                await fetch(API_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify(data) });
                alert("תודה רבה! פנייתך התקבלה ונציג יחזור אליך בהקדם.");
                window.location.href = "index.html";
            } catch (error) {
                alert("שגיאה בשליחה, אנא נסה שנית.");
                btn.disabled = false;
                btn.innerText = "שלח הודעה";
            }
        });
    </script>
</body>
</html>
