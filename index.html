<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>קעמפ-קליק | פלטפורמת אטרקציות מקצועית</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Assistant', sans-serif; }
        body { background-color: #fcfcfd; color: #1e293b; line-height: 1.7; font-size: 16px; text-align: center; }
        a { text-decoration: none; color: inherit; transition: all 0.25s ease; }

        /* אנימציית לוגו בכניסה */
        #loader-wrapper {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #fcfcfd; display: flex; justify-content: center;
            align-items: center; z-index: 9999; transition: opacity 0.5s ease;
        }
        #loader-logo { width: 150px; animation: growLogo 1s ease-in-out forwards; }
        @keyframes growLogo {
            0% { transform: scale(0.5); opacity: 0; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(1); opacity: 0; }
        }

        /* סרגל ניווט */
        header { background-color: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-bottom: 1px solid #e2e8f0; position: sticky; top: 0; z-index: 100; }
        .nav-container { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; }
        .nav-right { display: flex; align-items: center; gap: 45px; }
        .logo-container img { height: 42px; display: block; object-fit: contain; }
        .nav-menu { display: flex; list-style: none; gap: 30px; }
        .nav-menu li a { color: #475569; font-weight: 500; padding: 4px 0; }
        .nav-menu li a:hover { color: #0f172a; font-weight: 700; }
        
        .cart-btn { background-color: #ffffff; padding: 9px 20px; border-radius: 6px; border: 1px solid #cbd5e1; font-weight: 600; font-size: 14px; }
        .cart-count { background-color: #0f172a; color: white; font-size: 11px; padding: 1px 6px; border-radius: 4px; margin-right: 5px; }

        /* Hero */
        .hero { background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%); color: white; padding: 130px 20px; text-align: center; }
        .hero h1 { font-size: 48px; font-weight: 800; margin-bottom: 24px; }
        .hero p { font-size: 19px; margin-bottom: 40px; color: #94a3b8; max-width: 720px; margin-left: auto; margin-right: auto; }
        .hero-btn { background-color: #d97706; color: white; padding: 14px 40px; border-radius: 6px; font-weight: 600; display: inline-block; }

        /* About Section */
        .about-section { max-width: 1200px; margin: 90px auto; padding: 0 20px; }
        .banners-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 25px; margin-top: 50px; }
        .premium-banner { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 40px 35px; display: flex; flex-direction: column; align-items: center; gap: 20px; }
        .premium-banner.full-width { grid-column: span 2; }
        .banner-icon-container { background-color: #f8fafc; width: 65px; height: 65px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; border: 1px solid #f1f5f9; }
        
        footer { background-color: #0f172a; color: #64748b; text-align: center; padding: 35px 20px; margin-top: 120px; }

        @media (max-width: 768px) { .banners-grid { grid-template-columns: 1fr; } .premium-banner.full-width { grid-column: span 1; } }
    </style>
